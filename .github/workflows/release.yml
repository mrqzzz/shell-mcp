name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: shell-mcp-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: shell-mcp-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: shell-mcp-macos-intel
          - goos: darwin
            goarch: arm64
            asset_name: shell-mcp-macos-silicon
          - goos: windows
            goarch: amd64
            asset_name: shell-mcp-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.asset_name }} main.go

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
